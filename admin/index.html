<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchbook Map - Admin</title>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css' rel='stylesheet' />
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="top-bar">
            <div class="image-preview">
                <img id="current-image" src="" alt="Current sketch" onerror="console.error('Failed to load image:', this.src)">
                <div class="image-info">
                    <div class="filename" id="current-filename">Loading...</div>
                    <div class="progress" id="progress-text"></div>
                    <div class="save-status" id="save-status"></div>
                </div>
            </div>
        </div>
        
        <div class="map-container">
            <div id="map"></div>
            <div id="temp-marker" class="temp-marker" style="display: none;"></div>
            <div class="map-instruction" id="map-instruction">Click the map to place this sketch</div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search location...">
                <div id="search-results" class="search-results"></div>
            </div>
        </div>
        
        <div class="bottom-bar">
            <button id="back-btn" class="btn btn-secondary">← Back</button>
            <button id="skip-btn" class="btn btn-secondary">Skip →</button>
            <button id="confirm-btn" class="btn btn-primary" disabled>Confirm Location</button>
            <button id="save-data" class="btn btn-success" style="display: none;">Save All</button>
        </div>
    </div>
    
    <div id="status-message" class="status-message"></div>
    
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js'></script>
    <script src="../config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
